<!DOCTYPE html>
<html lang="th">
<head>

    <!-- Tailwind CSS -->

<body class="text-gray-800 min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden fade-in relative">
        <!-- Header -->
        <div class="bg-teal-600 p-6 text-white text-center relative overflow-hidden">
            <h1 class="text-2xl font-bold relative z-10">แบบทดสอบคณิตศาสตร์ ม.1</h1>
            <p class="text-teal-100 mt-2 relative z-10">เรื่อง อัตราส่วน ร้อยละ คู่อันดับ และสมการเชิงเส้น</p>
            <div class="absolute top-0 right-0 p-4 opacity-20">

            </div>
        </div>

        <!-- Start Screen -->

            </div>

            <button onclick="startQuiz()" class="bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-8 rounded-full text-lg shadow-lg transition duration-300 w-full sm:w-auto">
                เริ่มทำข้อสอบ <i class="fa-solid fa-arrow-right ml-2"></i>
            </button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="p-6 sm:p-8 hidden">
            <div class="flex justify-between items-center mb-6">
                <span id="question-tracker" class="text-sm font-semibold text-teal-600 bg-teal-100 py-1 px-3 rounded-full">ข้อ 1 / 30</span>
                <span id="score-tracker" class="text-sm font-semibold text-gray-500">คะแนน: 0</span>

            <div class="mb-6">

                </div>

                <h3 id="question-text" class="text-xl sm:text-2xl font-medium leading-relaxed mb-4 text-gray-800"></h3>
                
                <!-- Hint Button -->
                <button onclick="toggleHint()" id="hint-btn" class="text-amber-500 hover:text-amber-600 text-sm font-medium flex items-center transition mb-4">

                </button>
                <div id="hint-box" class="hidden bg-amber-50 border border-amber-200 text-amber-800 p-3 rounded-lg text-sm mb-6 fade-in">

            </div>

            </div>

            <div class="flex justify-between items-center mt-4">
                <div class="flex space-x-2">
                    <button id="prev-btn" onclick="prevQuestion()" class="hidden text-gray-500 hover:text-gray-800 hover:bg-gray-100 font-medium py-2 px-4 rounded-lg transition duration-300">

                    <button id="skip-btn" onclick="skipQuestion()" class="text-gray-500 hover:text-gray-800 hover:bg-gray-100 font-medium py-2 px-4 rounded-lg transition duration-300">

                    </button>
                </div>
                <button id="next-btn" onclick="nextQuestion()" class="hidden bg-teal-600 hover:bg-teal-700 text-white font-bold py-2 px-6 rounded-lg transition duration-300 ml-auto">
                    ข้อต่อไป <i class="fa-solid fa-angle-right ml-2"></i>

        </div>

        <!-- Result Screen -->

            </button>
        </div>
    </div>

    <script>
        const quizData = [
            // อัตราส่วนและสัดส่วน (1-10)
            {
                question: "จงหาค่าของ \\(x\\) จากสัดส่วน \\(4 : 7 = x : 28\\)",
                options: [
                    { text: "12", correct: false, rationale: "ยังไม่ใช่คำตอบที่ถูกต้อง ลองเทียบสัดส่วนใหม่" },
                    { text: "14", correct: false, rationale: "อาจนำ 7 ไปคูณ 2" },
                    { text: "16", correct: true, rationale: "จาก \\(\\frac{4}{7} = \\frac{x}{28}\\) นำ 28 ไปคูณ 4 จะได้ 112 หาร 7 เท่ากับ 16 (หรือมองว่า 7 คูณ 4 ได้ 28 ดังนั้น 4 ต้องคูณ 4 ได้ 16)" },
                    { text: "21", correct: false, rationale: "คูณไขว้ผิดพลาด" }
                ],
                hint: "7 คูณอะไรแล้วได้ 28? ให้นำตัวเลขนั้นไปคูณ 4 ด้วย"
            },
            {
                question: "ถ้าดินสอ 5 แท่ง ราคา 25 บาท แล้วดินสอ 12 แท่ง จะราคาเท่าไหร่",
                options: [
                    { text: "50 บาท", correct: false, rationale: "นี่คือราคาของดินสอ 10 แท่ง" },
                    { text: "60 บาท", correct: true, rationale: "ดินสอ 1 แท่ง ราคา \\(25 \\div 5 = 5\\) บาท ดังนั้น 12 แท่ง ราคา \\(12 \\times 5 = 60\\) บาท" },
                    { text: "72 บาท", correct: false, rationale: "คิดเลขผิดพลาดในขั้นตอนสุดท้าย" },
                    { text: "80 บาท", correct: false, rationale: "คำนวณบัญญัติไตรยางศ์ผิด" }
                ],
                hint: "หาดินสอ 1 แท่งให้ได้ก่อนว่าราคากี่บาท"
            },
            {
                question: "อัตราส่วนของจำนวนไก่ต่อจำนวนเป็ดในฟาร์มคือ \\(3 : 4\\) ถ้ามีเป็ด 20 ตัว จะมีไก่กี่ตัว",
                options: [
                    { text: "10 ตัว", correct: false, rationale: "สัดส่วนยังไม่ถูกต้อง" },
                    { text: "12 ตัว", correct: false, rationale: "คูณสัดส่วนผิด" },
                    { text: "15 ตัว", correct: true, rationale: "ไก่/เป็ด = 3/4 = x/20 จะได้ \\(4x = 60\\) ดังนั้น \\(x = 15\\)" },
                    { text: "18 ตัว", correct: false, rationale: "กะประมาณตัวเลขผิด" }
                ],
                hint: "4 คูณอะไรได้ 20? ให้นำตัวเลขนั้นไปคูณกับ 3"
            },
            {
                question: "จงหาค่า \\(b\\) จากสมการ \\(\\frac{b}{5} = \\frac{15}{25}\\)",
                options: [
                    { text: "2", correct: false, rationale: "ยังไม่ใช่คำตอบที่ถูก" },
                    { text: "3", correct: true, rationale: "นำ 5 ไปคูณ 15 ได้ 75 แล้วหารด้วย 25 จะได้ 3 (หรือทอน \\(\\frac{15}{25}\\) เป็น \\(\\frac{3}{5}\\))" },
                    { text: "4", correct: false, rationale: "นี่คือตัวส่วน" },
                    { text: "5", correct: false, rationale: "คำนวณการคูณไขว้ผิดพลาด" }
                ],
                hint: "ลองทำเศษส่วน \\(\\frac{15}{25}\\) ให้เป็นเศษส่วนอย่างต่ำก่อน"
            },
            {
                question: "สูตรชงน้ำหวานใช้น้ำเชื่อม 3 ส่วน ต่อน้ำเปล่า 5 ส่วน ถ้าใช้น้ำเชื่อม 9 ส่วน จะต้องใช้น้ำเปล่ากี่ส่วน",
                options: [
                    { text: "10 ส่วน", correct: false, rationale: "ยังไม่ใช่สัดส่วนที่ถูกต้อง" },
                    { text: "12 ส่วน", correct: false, rationale: "คำนวณการเพิ่มผิดพลาด" },
                    { text: "15 ส่วน", correct: true, rationale: "น้ำเชื่อมเพิ่มจาก 3 เป็น 9 (คูณ 3) ดังนั้นน้ำเปล่าต้องเพิ่มจาก 5 เป็น \\(5 \\times 3 = 15\\) ส่วน" },
                    { text: "18 ส่วน", correct: false, rationale: "สัดส่วนไม่ตรง" }
                ],
                hint: "น้ำเชื่อมจาก 3 ส่วน กลายเป็น 9 ส่วน (เพิ่มขึ้นกี่เท่า?)"
            },
            {
                question: "สมุด 3 เล่ม ราคา 45 บาท ถ้าซื้อ 8 เล่ม ต้องจ่ายเงินกี่บาท",
                options: [
                    { text: "100 บาท", correct: false, rationale: "ประเมินราคาต่ำไป" },
                    { text: "105 บาท", correct: false, rationale: "นี่คือราคา 7 เล่ม" },
                    { text: "120 บาท", correct: true, rationale: "เล่มละ \\(45 \\div 3 = 15\\) บาท ดังนั้น 8 เล่มจ่าย \\(8 \\times 15 = 120\\) บาท" },
                    { text: "135 บาท", correct: false, rationale: "นี่คือราคา 9 เล่ม" }
                ],
                hint: "หาสมุดราคาเล่มละกี่บาทก่อน"
            },
            {
                question: "จงหาค่าของ \\(x\\) จากสัดส่วน \\(3 : 8 = x : 40\\)",
                options: [
                    { text: "12", correct: false, rationale: "คูณสัดส่วนผิด" },
                    { text: "15", correct: true, rationale: "8 คูณ 5 ได้ 40 ดังนั้น 3 ก็ต้องคูณ 5 ได้ 15" },
                    { text: "18", correct: false, rationale: "นำ 3 ไปคูณ 6" },
                    { text: "24", correct: false, rationale: "อาจนำ 8 ไปคูณ 3" }
                ],
                hint: "8 คูณกับอะไรจึงจะเท่ากับ 40"
            },
            {
                question: "แผนผังใช้มาตราส่วน \\(1 : 500\\) ถ้าระยะในแผนผังคือ 4 เซนติเมตร ระยะทางจริงคือกี่เมตร",
                options: [
                    { text: "2 เมตร", correct: false, rationale: "แปลงหน่วยผิด" },
                    { text: "20 เมตร", correct: true, rationale: "จริงคือ \\(4 \\times 500 = 2,000\\) ซม. ซึ่ง 100 ซม. = 1 เมตร ดังนั้น 2,000 ซม. = 20 เมตร" },
                    { text: "200 เมตร", correct: false, rationale: "แปลงหน่วยเซนติเมตรเป็นเมตรผิด" },
                    { text: "2,000 เมตร", correct: false, rationale: "นี่คือหน่วยเซนติเมตร ไม่ใช่เมตร" }
                ],
                hint: "ได้ผลลัพธ์เป็นเซนติเมตรแล้ว อย่าลืมหาร 100 เพื่อแปลงเป็นเมตร"
            },
            {
                question: "ส้ม 4 กิโลกรัม ราคา 160 บาท ถ้ามีเงิน 280 บาท จะซื้อส้มได้กี่กิโลกรัม",
                options: [
                    { text: "5 กิโลกรัม", correct: false, rationale: "ใช้เงินไปแค่ 200 บาท" },
                    { text: "6 กิโลกรัม", correct: false, rationale: "ใช้เงินไป 240 บาท" },
                    { text: "7 กิโลกรัม", correct: true, rationale: "ส้มกิโลกรัมละ \\(160 \\div 4 = 40\\) บาท เงิน 280 บาท ซื้อได้ \\(280 \\div 40 = 7\\) กิโลกรัม" },
                    { text: "8 กิโลกรัม", correct: false, rationale: "เกินงบ (320 บาท)" }
                ],
                hint: "กิโลกรัมละกี่บาท เอาราคาต่อกิโลกรัมไปหาร 280"
            },
            {
                question: "จงหาค่า \\(x\\) จากสัดส่วน \\(5 : 9 = 20 : x\\)",
                options: [
                    { text: "27", correct: false, rationale: "นำ 9 ไปคูณ 3" },
                    { text: "32", correct: false, rationale: "คูณเลขผิด" },
                    { text: "36", correct: true, rationale: "5 คูณ 4 ได้ 20 ดังนั้น 9 ต้องคูณ 4 ได้ 36" },
                    { text: "45", correct: false, rationale: "นำ 9 ไปคูณ 5" }
                ],
                hint: "จาก 5 เป็น 20 เพิ่มขึ้นกี่เท่า"
            },

            // ร้อยละและเปอร์เซ็นต์ (11-15)
            {
                question: "ข้อใดมีค่าเท่ากับ \\(72\\%\\)",
                options: [
                    { text: "0.072", correct: false, rationale: "ทศนิยมผิดตำแหน่ง" },
                    { text: "\\(0.72\\)", correct: true, rationale: "\\(72\\% = \\frac{72}{100} = 0.72\\)" },
                    { text: "\\(7.2\\)", correct: false, rationale: "ทศนิยมผิดตำแหน่ง" },
                    { text: "72", correct: false, rationale: "นี่คือจำนวนเต็มร้อยเปอร์เซ็นต์" }
                ],
                hint: "เปอร์เซ็นต์คือการหารด้วย 100 เลื่อนจุดทศนิยม 2 ตำแหน่ง"
            },
            {
                question: "\\(40\\%\\) ของ 500 มีค่าเท่ากับข้อใด",
                options: [
                    { text: "150", correct: false, rationale: "นี่คือ \\(30\\%\\) ของ 500" },
                    { text: "180", correct: false, rationale: "คำนวณผิดพลาด" },
                    { text: "200", correct: true, rationale: "\\(\\frac{40}{100} \\times 500 = 40 \\times 5 = 200\\)" },
                    { text: "240", correct: false, rationale: "ตัวเลขนี้สูงเกินไป" }
                ],
                hint: "นำ \\(\\frac{40}{100}\\) ไปคูณกับ 500"
            },
            {
                question: "15 คิดเป็นกี่เปอร์เซ็นต์ของ 60",
                options: [
                    { text: "\\(20\\%\\)", correct: false, rationale: "คำนวณเศษส่วนผิด" },
                    { text: "\\(25\\%\\)", correct: true, rationale: "\\(\\frac{15}{60} \\times 100 = \\frac{1}{4} \\times 100 = 25\\%\\)" },
                    { text: "\\(30\\%\\)", correct: false, rationale: "ยังไม่ถูกต้อง" },
                    { text: "\\(40\\%\\)", correct: false, rationale: "อาจคำนวณสลับตำแหน่ง" }
                ],
                hint: "นำตัวที่สนใจ (15) หารด้วยทั้งหมด (60) แล้วคูณ 100"
            },
            {
                imageUrl: "https://placehold.co/400x200/ef4444/ffffff?text=SALE+-20%25",
                question: "กางเกงตัวหนึ่งราคาป้าย 500 บาท ร้านค้าลดราคาตามป้ายที่ปรากฏ ผู้ซื้อต้องจ่ายเงินกี่บาท",
                options: [
                    { text: "380 บาท", correct: false, rationale: "หักส่วนลดมากเกินไป" },
                    { text: "400 บาท", correct: true, rationale: "ลด \\(20\\%\\) ของ 500 คือ 100 บาท ต้องจ่ายจริง \\(500 - 100 = 400\\) บาท" },
                    { text: "420 บาท", correct: false, rationale: "คิดเลขผิด" },
                    { text: "480 บาท", correct: false, rationale: "เอา 20 ไปลบออกจาก 500 เลย" }
                ],
                hint: "ดูเปอร์เซ็นต์ลดราคาจากป้าย หาให้เจอก่อนว่าส่วนลดคือเงินกี่บาท แล้วนำไปลบออกจากราคาเต็ม"
            },
            {
                question: "ซื้อเก้าอี้มาในราคา 400 บาท ขายไปในราคา 480 บาท ได้กำไรกี่เปอร์เซ็นต์",
                options: [
                    { text: "\\(15\\%\\)", correct: false, rationale: "ยังไม่ถูกต้อง" },
                    { text: "\\(20\\%\\)", correct: true, rationale: "กำไร 80 บาท คิดจากต้นทุน 400 บาท: \\(\\frac{80}{400} \\times 100 = 20\\%\\)" },
                    { text: "\\(25\\%\\)", correct: false, rationale: "คูณสัดส่วนผิด" },
                    { text: "\\(80\\%\\)", correct: false, rationale: "เอาเลข 80 มาตอบเลยโดยไม่เทียบร้อยละ" }
                ],
                hint: "กำไรกี่บาท? แล้วนำกำไรนั้นไปหารด้วย 'ต้นทุน 400'"

            // คู่อันดับและกราฟ (16-22)
            {
                imageUrl: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Cartesian-coordinate-system.svg/320px-Cartesian-coordinate-system.svg.png",
                question: "จากภาพระนาบพิกัดฉาก จุดที่เกิดจากการตัดกันของแกน X และแกน Y มีพิกัดตรงกับข้อใด",
                options: [

        let currentQuestion = 0;
        let userAnswers = [];

        function startQuiz() {
            userAnswers = new Array(quizData.length).fill(null);
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            loadQuestion();
        }

        function calculateScore() {
            let currentScore = 0;
            userAnswers.forEach((ans, index) => {
                if (ans !== null && quizData[index].options[ans].correct) {
                    currentScore++;
                }
            });
            return currentScore;
        }

        function loadQuestion() {
            const q = quizData[currentQuestion];
            
            // Update trackers
            document.getElementById('question-tracker').innerText = `ข้อ ${currentQuestion + 1} / ${quizData.length}`;
            document.getElementById('score-tracker').innerText = `คะแนน: ${calculateScore()}`;
            
            // Update progress bar
            const progress = (currentQuestion / quizData.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            
            // Handle Image display
            const imgContainer = document.getElementById('question-image-container');
            const imgElement = document.getElementById('question-image');
            if (q.imageUrl) {
                imgElement.src = q.imageUrl;
                imgContainer.classList.remove('hidden');
            } else {
                imgContainer.classList.add('hidden');
                imgElement.src = '';
            }

            // Set question text
            document.getElementById('question-text').innerHTML = `${currentQuestion + 1}. ${q.question}`;
            
            // Reset hint
            const hintBox = document.getElementById('hint-box');
            hintBox.classList.add('hidden');
            hintBox.innerHTML = `<i class="fa-solid fa-circle-info mr-2"></i> ${q.hint}`;
            
            // Clear previous options and feedback
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            document.getElementById('feedback-container').classList.add('hidden');
            
            const nextBtn = document.getElementById('next-btn');
            const skipBtn = document.getElementById('skip-btn');
            const prevBtn = document.getElementById('prev-btn');
            
            // Manage Previous Button
            if (currentQuestion > 0) {
                prevBtn.classList.remove('hidden');
            } else {
                prevBtn.classList.add('hidden');
            }

            // Generate options
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left p-4 border-2 border-gray-200 rounded-xl hover:border-teal-400 hover:bg-teal-50 transition bg-white text-gray-700 font-medium';
                btn.id = `option-${index}`;
                btn.innerHTML = `<span class="inline-block w-8 h-8 text-center leading-8 bg-gray-100 rounded-full mr-3 text-sm font-bold text-gray-500">${String.fromCharCode(161 + index)}</span> ${opt.text}`;
                btn.onclick = () => selectOption(index);
                optionsContainer.appendChild(btn);
            });

            // Re-render MathJax
            if (window.MathJax) {
                MathJax.typesetPromise();
            }

            // Check if already answered
            if (userAnswers[currentQuestion] !== null) {
                showAnswerState(userAnswers[currentQuestion]);
            } else {
                nextBtn.classList.add('hidden');
                skipBtn.classList.remove('hidden');
                
                if (currentQuestion === quizData.length - 1) {
                    skipBtn.innerHTML = 'ข้ามและดูผลคะแนน <i class="fa-solid fa-flag-checkered ml-1"></i>';
                } else {
                    skipBtn.innerHTML = 'ข้ามข้อนี้ <i class="fa-solid fa-forward-step ml-1"></i>';
                }
            }
        }

        function toggleHint() {
            const hintBox = document.getElementById('hint-box');
            hintBox.classList.toggle('hidden');
        }

        function selectOption(selectedIndex) {
            if (userAnswers[currentQuestion] !== null) return;
            userAnswers[currentQuestion] = selectedIndex;
            
            document.getElementById('score-tracker').innerText = `คะแนน: ${calculateScore()}`;
            
            showAnswerState(selectedIndex);
        }

        function showAnswerState(selectedIndex) {
            const q = quizData[currentQuestion];
            const isCorrect = q.options[selectedIndex].correct;

            // Disable all buttons and show correct/wrong states
            q.options.forEach((opt, index) => {
                const btn = document.getElementById(`option-${index}`);
                btn.disabled = true;
                if (opt.correct) {
                    btn.classList.add('correct-ans');
                } else if (index === selectedIndex && !isCorrect) {
                    btn.classList.add('wrong-ans');
                } else {
                    btn.classList.add('opacity-50');
                }
            });

            // Show feedback
            const feedbackContainer = document.getElementById('feedback-container');
            const feedbackIcon = document.getElementById('feedback-icon');
            const feedbackText = document.getElementById('feedback-text');
            
            feedbackContainer.classList.remove('hidden');
            if (isCorrect) {
                feedbackContainer.className = 'p-4 rounded-lg mb-6 fade-in border bg-emerald-50 border-emerald-200 relative';
                feedbackIcon.className = 'text-lg font-bold mb-2 flex items-center text-emerald-600';
                feedbackIcon.innerHTML = '<i class="fa-solid fa-circle-check mr-2"></i> ถูกต้อง!';
            } else {
                feedbackContainer.className = 'p-4 rounded-lg mb-6 fade-in border bg-red-50 border-red-200 relative';
                feedbackIcon.className = 'text-lg font-bold mb-2 flex items-center text-red-600';
                feedbackIcon.innerHTML = '<i class="fa-solid fa-circle-xmark mr-2"></i> ยังไม่ถูกครับ';
            }
            
            feedbackText.innerHTML = q.options[selectedIndex].rationale;
            
            // Re-render MathJax in feedback
            if (window.MathJax) {
                MathJax.typesetPromise([feedbackText]);
            }

            // Setup buttons
            const nextBtn = document.getElementById('next-btn');
            const skipBtn = document.getElementById('skip-btn');
            
            skipBtn.classList.add('hidden');
            nextBtn.classList.remove('hidden');
            
            if (currentQuestion === quizData.length - 1) {
                nextBtn.innerHTML = 'ดูผลคะแนน <i class="fa-solid fa-flag-checkered ml-2"></i>';
            } else {
                nextBtn.innerHTML = 'ข้อต่อไป <i class="fa-solid fa-angle-right ml-2"></i>';
            }
        }

        function skipQuestion() {
            if (userAnswers[currentQuestion] !== null) return;
            nextQuestion();
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                loadQuestion();
            }
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            // Set 100% progress
            document.getElementById('progress-bar').style.width = '100%';
            
            const finalScore = calculateScore();
            document.getElementById('final-score').innerText = finalScore;
            
            const resultMessage = document.getElementById('result-message');
            const resultIcon = document.getElementById('result-icon');
            
            // Calculate percentage
            const percentage = (finalScore / quizData.length) * 100;

            if (percentage >= 80) {
                resultMessage.innerText = "ยอดเยี่ยมมาก! พื้นฐานคณิตศาสตร์ของคุณแน่นเปรี๊ยะ พร้อมลุยในระดับถัดไป";
                resultMessage.className = "text-emerald-600 mb-8 text-lg font-medium";
                resultIcon.innerHTML = '<i class="fa-solid fa-trophy text-yellow-400 drop-shadow-lg"></i>';
            } else if (percentage >= 60) {
                resultMessage.innerText = "ทำได้ดีมากครับ! ผ่านเกณฑ์สบายๆ ลองทบทวนอีกนิดจะได้คะแนนเต็มนะ";
                resultMessage.className = "text-blue-600 mb-8 text-lg font-medium";
                resultIcon.innerHTML = '<i class="fa-regular fa-face-smile-beam text-blue-500"></i>';
            } else if (percentage >= 50) {
                resultMessage.innerText = "ผ่านเกณฑ์พอดีครับ! ถือว่ามีพื้นฐานอยู่บ้าง แต่ควรฝึกทำโจทย์บ่อยๆ นะ";
                resultMessage.className = "text-amber-600 mb-8 text-lg font-medium";
                resultIcon.innerHTML = '<i class="fa-solid fa-thumbs-up text-amber-500"></i>';
            } else {
                resultMessage.innerText = "พยายามเข้านะครับ! ข้อสอบอาจจะยากไปนิด ลองกลับไปทบทวนเนื้อหาแล้วมาสู้ใหม่นะ";
                resultMessage.className = "text-red-500 mb-8 text-lg font-medium";
                resultIcon.innerHTML = '<i class="fa-solid fa-book-open text-red-400"></i>';
            }
        }
    </script>
</body>
</html>
